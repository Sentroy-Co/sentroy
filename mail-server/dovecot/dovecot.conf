# Dovecot Konfigürasyon — Sentroy Mail Server

# Protokoller
protocols = imap lmtp

# Dinleme
listen = *

# Loglama
log_path = /dev/stderr
info_log_path = /dev/stdout
debug_log_path = /dev/stdout
auth_verbose = yes

# Mail konumu — Maildir formatı
mail_location = maildir:/var/mail/vhosts/%d/%n
mail_uid = 5000
mail_gid = 5000
mail_privileged_group = vmail
first_valid_uid = 5000
last_valid_uid = 5000

# Namespace
namespace inbox {
  inbox = yes
  separator = /

  mailbox Drafts {
    auto = subscribe
    special_use = \Drafts
  }
  mailbox Sent {
    auto = subscribe
    special_use = \Sent
  }
  mailbox Trash {
    auto = subscribe
    special_use = \Trash
  }
  mailbox Spam {
    auto = subscribe
    special_use = \Junk
  }
}

# Authentication
auth_mechanisms = plain login
auth_master_user_separator = *

# Master user — API servisi herhangi bir kullanıcı adına IMAP işlemi yapabilir
passdb {
  driver = passwd-file
  args = /etc/dovecot/users-data/master-users
  master = yes
  result_success = continue
}

# Passwd-file auth (API servisi bu dosyayı yönetir)
passdb {
  driver = passwd-file
  args = /etc/dovecot/users-data/users
}
userdb {
  driver = passwd-file
  args = /etc/dovecot/users-data/users
  default_fields = uid=5000 gid=5000 home=/var/mail/vhosts/%d/%n
}

# SASL — Postfix authentication için
service auth {
  inet_listener {
    port = 12345
  }
}

# LMTP — Postfix'ten mail alımı
service lmtp {
  inet_listener lmtp {
    port = 24
  }
}

# IMAP
service imap-login {
  inet_listener imap {
    port = 143
  }
  inet_listener imaps {
    port = 993
    ssl = yes
  }
}

# SSL/TLS
ssl = required
ssl_cert = </etc/ssl/certs/ssl-cert-snakeoil.pem
ssl_key = </etc/ssl/private/ssl-cert-snakeoil.key
ssl_min_protocol = TLSv1.2
ssl_cipher_list = ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
ssl_prefer_server_ciphers = yes

# Protocol ayarları
protocol imap {
  mail_max_userip_connections = 20
  imap_idle_notify_interval = 2 mins
}

protocol lmtp {
  mail_plugins = ""
  postmaster_address = postmaster@localhost
}
