# DKIM İmzalama Konfigürasyonu
enabled = true;

# Key dosya yolu şablonu
path = "/etc/rspamd/dkim/$domain.$selector.key";

# Varsayılan selector
selector = "mail";

# Domain bazlı selector map (API tarafından güncellenir)
selector_map = "/etc/rspamd/dkim/dkim_selectors.map";

# İmzalanacak header'lar
sign_headers = "from:sender:reply-to:subject:date:message-id:to:cc:mime-version:content-type:content-transfer-encoding:resent-to:resent-cc:resent-from:resent-sender:resent-message-id:in-reply-to:references:list-id:list-owner:list-unsubscribe:list-subscribe:list-post";

# Authenticated kullanıcılar için imzala
allow_username_mismatch = true;

use_domain = "header";
use_esld = false;
