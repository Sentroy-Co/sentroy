#
# On a release tag (v*), build + push multi-arch images to GHCR so self-hosters
# can pull instead of building. Distinct image names from the private Coolify
# pipeline; migrate Coolify pins deliberately.

name: publish-images

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - core
          - mail
          - storage
          - auth2
          - status
          - studio
          - whatsapp
          - whatsapp-gateway
          - linear
          - backup
          - backup-worker
          - downloader
          - downloader-worker
          - cdn
          - status-worker
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR repository names must be lowercase; the org login (Sentroy-Co) is
      # mixed-case, so lowercase it before composing image tags.
      - name: Lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          # amd64-only: covers virtually every self-host target and keeps the
          # build fast/reliable. arm64 via QEMU emulation is slow and flaky for
          # these Next.js builds; re-add it with native arm runners if needed.
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/sentroy-${{ matrix.app }}:${{ github.ref_name }}
            ghcr.io/${{ env.OWNER_LC }}/sentroy-${{ matrix.app }}:latest
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
